<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>צ'אט אמיתי</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="./icone.png">

</head>
<style>
  /* הלוגו */
.chat-icon {
  width: 40px;
  height: 40px;
  object-fit: cover;
  border-radius: 50%;
  margin-left: 10px;
  border: 2px solid white;
  background: white;
  padding: 3px;
  transition: 0.3s ease;
}

/* אפקט מעבר */
.chat-icon:hover {
  transform: scale(1.1) rotate(3deg);
}
.chat-icon {
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
</style>
<body>

  <div class="chat-container">

    <div class="chat-header">
      <img src="./icone.png" alt="Icon" class="chat-icon">
     <button id="logoutBtn">התנתק</button>
      <button id="adminPanelBtn" style="display:none;">ניהול</button>
    </div>
    <div id="adminPanel">

    </div>
    <div id="chatBox" class="chat-box"></div>
    <input type="file" id="fileInput" accept="image/*">
    <span id="fileName"></span>
    <div class="chat-input">
      <div id="statusBox" style="color:red;font-weight:bold;margin:10px;"></div>

      <input id="messageInput" placeholder="כתוב הודעה..." />
      <button id="sendBtn">שלח</button>
    </div>
  </div>

  <script type="module" src="script.js?v=1.0"></script>
</body>

</html>
