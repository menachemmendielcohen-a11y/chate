<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat App</title>
  <link rel="icon" type="image/png" href="./ChatGPT Image Apr 12, 2026, 08_55_39 PM.png">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      background: linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .card {
      background: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      width: 300px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: pop 0.4s ease;
    }

    @keyframes pop {
      from { transform: scale(0.8); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    h1 {
      margin-bottom: 10px;
      color: #333;
    }

    p {
      color: gray;
      font-size: 14px;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 12px;
      background: #4facfe;
      color: white;
      font-size: 18px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #2196f3;
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>💬 Chat App</h1>
    <p>ברוך הבא למערכת הצ'אט</p>

    <button onclick="goLogin()">כניסה למערכת</button>
  </div>

  <script>
    function goLogin() {
      window.location.href = "login.html";
    }
  </script>

</body>
</html>
