<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>צ'אט אמיתי</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="chat-container">
    <div class="chat-header">
      <span>💬 צ'אט בזמן אמת</span>
      <div class="header-user">
        <span id="currentUserName">טוען...</span>
        <button id="adminBtn" style="display:none;">ניהול</button>
        <button id="logoutBtn">התנתק</button>
      </div>
    </div>

    <div id="chatBox" class="chat-box"></div>

    <div class="chat-input">
      <input type="text" id="messageInput" placeholder="כתוב הודעה...">
      <button id="sendBtn">שלח</button>
    </div>
  </div>

<script type="module" src="./script.js"></script>
</body>
</html>
