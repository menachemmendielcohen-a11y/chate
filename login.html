<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>התחברות</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="login-container">

    <h2>🔐 התחברות</h2>

    <input type="email" id="email" placeholder="אימייל">
    <input type="password" id="password" placeholder="סיסמה">

    <button id="loginBtn">התחבר</button>

    <button id="googleBtn" class="google-btn">
      <img
        src="https://techdocs.akamai.com/identity-cloud/img/social-login/identity-providers/iconfinder-new-google-favicon-682665.png">
      התחבר עם Google
    </button>

    <div id="error" class="error"></div>

  </div>

  <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// =========================
// 🔥 Firebase Config
// =========================

const firebaseConfig = {
  apiKey: "AIzaSyA9XpGHgpzeUvA8CGIL-OYuKOTcTKKB_rg",
  authDomain: "chat-app-6c55d.firebaseapp.com",
  projectId: "chat-app-6c55d",
  storageBucket: "chat-app-6c55d.appspot.com",
  messagingSenderId: "193935015893",
  appId: "1:193935015893:web:535f24e6e67e0ac91fc75c",
};

// =========================
// 🚀 Init
// =========================

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const provider = new GoogleAuthProvider();

const errorBox = document.getElementById("error");

// =========================
// 👤 שמירת משתמש
// =========================

async function saveUser(user, providerType) {
  const userRef = doc(db, "users", user.uid);
  const snap = await getDoc(userRef);

  if (!snap.exists()) {
    await setDoc(userRef, {
      email: user.email,
      username: user.displayName || user.email,
      provider: providerType,
      isAdmin: false,
      createdAt: new Date()
    });
  }

  const updated = await getDoc(userRef);
  const data = updated.data();

  sessionStorage.setItem("uid", user.uid);
  sessionStorage.setItem("username", data.username);
  sessionStorage.setItem("isAdmin", data.isAdmin === true ? "true" : "false");

  window.location.href = "chat.html";
}

// =========================
// 📧 Email Login
// =========================

document.getElementById("loginBtn").onclick = async () => {
  try {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const userCred = await signInWithEmailAndPassword(auth, email, password);

    await saveUser(userCred.user, "email");

  } catch (err) {
    errorBox.innerText = err.message;
  }
};

// =========================
// 🔵 Google Login
// =========================

document.getElementById("googleBtn").onclick = async () => {
  try {
    const result = await signInWithPopup(auth, provider);

    await saveUser(result.user, "google");

  } catch (err) {
    console.log(err);
    errorBox.innerText = err.message;
  }
};
  </script>

</body>

</html>
